events {
    worker_connections 1024;
}

http {
    # Include default mime types so styles and scripts load correctly
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost; # Change this to your public IP if needed, e.g., 13.206.204.101

        # ------------------------------------------------------------------
        # Frontend Next.js / React
        # ------------------------------------------------------------------
        location / {
            proxy_pass http://hotel_frontend:3000;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------------------------------------------------------------------
        # Admin Panel
        # ------------------------------------------------------------------
        location /admin/ {
            proxy_pass http://hotel_admin_panel:80; # Ensure this matches your admin port (e.g., 80, 3001, or 5173)
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------------------------------------------------------------------
        # Backend API
        # ------------------------------------------------------------------
        location /api/ {
            proxy_pass http://hotel_backend:5000;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
